<!DOCTYPE html>
<html>

<head>
    <title>All Blogs</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            margin: 0;
            background: linear-gradient(135deg, #1e3a8a, #9333ea);
            color: white;
        }

        /* HEADER */
        .header {
            padding: 20px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
        }

        .container {
            padding: 20px;
        }

        /* SEARCH */
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .search-box input {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: none;
        }

        .search-box button {
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            background: #22c55e;
            color: white;
            cursor: pointer;
        }

        /* GRID */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        /* CARD */
        .card {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 15px;
            backdrop-filter: blur(10px);
            transition: 0.3s;
            animation: fadeIn 0.6s ease;
        }

        .card:hover {
            transform: translateY(-8px);
            background: rgba(255,255,255,0.2);
        }

        img {
            width: 100%;
            border-radius: 10px;
            margin-top: 10px;
        }

        h3 {
            margin: 10px 0;
        }

        p {
            font-size: 14px;
            color: #eee;
        }

        small {
            color: #ccc;
        }

        .actions {
            margin-top: 10px;
        }

        .actions a {
            text-decoration: none;
            margin-right: 10px;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 13px;
        }

        .edit {
            background: #3b82f6;
            color: white;
        }

        .delete {
            background: #ef4444;
            color: white;
        }

        .back {
            margin-top: 20px;
            text-align: center;
        }

        .back a {
            color: #ddd;
            text-decoration: none;
        }

        /* ANIMATION */
        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(20px);}
            to {opacity: 1; transform: translateY(0);}
        }
    </style>
</head>

<body>

<div class="header">
    📰 All Blogs
</div>

<div class="container">

    <!-- SEARCH -->
    <form method="get" action="/blogs" class="search-box">

        <input type="text" name="search" placeholder="Search blog...">

        <button type="submit">Search</button>

    </form>

    <!-- BLOG GRID -->
    <div class="grid">

        {% for b in blogs %}

        <div class="card">

            <h3>{{ b[1] }}</h3>

            {% if b[3] %}
            <img src="/uploads/{{ b[3] }}">
            {% endif %}

            <p>{{ b[2] }}</p>

            <small>By {{ b[4] }}</small>

            <div class="actions">
                <a href="/edit_blog/{{ b[0] }}" class="edit">Edit</a>
                <a href="/delete_blog/{{ b[0] }}" class="delete">Delete</a>
            </div>

        </div>

        {% endfor %}

    </div>

    <div class="back">
        <a href="/dashboard">⬅ Back to Dashboard</a>
    </div>

</div>

</body>

</html>
